<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EA580C">
<title>손주마켓</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<style>
  /* keep-all: 한글 단어가 중간에 안 잘리고 통째로 줄바꿈됨 (안녕하세/요 방지) */
  * { box-sizing: border-box; word-break: keep-all; overflow-wrap: break-word; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; background: #FFF7ED; color: #1c1917; min-height: 100vh; }
  .wrap { max-width: 520px; margin: 0 auto; padding: 0 18px calc(28px + env(safe-area-inset-bottom)); }

  header { display: flex; align-items: center; gap: 12px; padding: calc(16px + env(safe-area-inset-top)) 4px 14px;
    position: sticky; top: 0; background: #FFF7ED; z-index: 5; }
  header img { width: 50px; height: 50px; border-radius: 14px; }
  header .name { font-size: clamp(24px, 7vw, 30px); font-weight: 800; }

  .order-btn { width: 100%; min-height: 180px; border: none; border-radius: 28px; background: #EA580C; color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 12px 30px rgba(234,88,12,.32); cursor: pointer; margin-top: 6px; padding: 22px; }
  .order-btn:active { transform: scale(.98); background: #c2410c; }
  .order-btn .cam { font-size: 64px; line-height: 1; }
  .order-btn .t1 { font-size: clamp(30px, 8.5vw, 38px); font-weight: 800; text-align: center; }
  .order-btn .t2 { font-size: clamp(18px, 5vw, 22px); font-weight: 500; opacity: .95; text-align: center; }
  input[type=file] { display: none; }

  /* 주문 방법 안내 (그림) */
  .howto { background: #fff; border-radius: 22px; padding: 18px 12px; margin-top: 14px; box-shadow: 0 4px 14px rgba(0,0,0,.06); }
  .howto .htline { font-size: clamp(20px, 5.4vw, 23px); font-weight: 800; color: #c2410c; text-align: center; margin-bottom: 16px; line-height: 1.4; }
  .howto .steps3 { display: flex; align-items: flex-start; justify-content: space-between; }
  .howto .s3 { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 30%; }
  .howto .s3 .ic { font-size: 46px; line-height: 1; }
  .howto .s3 .tx { font-size: clamp(16px, 4.4vw, 19px); font-weight: 700; text-align: center; line-height: 1.35; }
  .howto .arrow3 { font-size: 24px; color: #FDBA74; padding-top: 14px; }

  .cancel-tag { font-size: 18px; color: #dc2626; font-weight: 800; margin-top: 5px; }

  /* 당일처리 배너 */
  .promise { margin-top: 14px; background: #FEF3C7; border: 2px solid #FCD34D; border-radius: 18px;
    padding: 16px 18px; font-size: clamp(19px, 5.2vw, 22px); font-weight: 700; color: #92400e; text-align: center; line-height: 1.45; }

  .section-title { font-size: 24px; font-weight: 800; color: #57534e; margin: 26px 4px 12px; }

  .card { background: #fff; border-radius: 22px; padding: 14px; display: flex; align-items: center; gap: 16px;
    margin-bottom: 14px; box-shadow: 0 4px 14px rgba(0,0,0,.06); cursor: pointer; border: 3px solid transparent; }
  .card:active { transform: scale(.99); }
  .card.hot { border-color: #FDBA74; }
  .card.money { border-color: #86efac; }
  .card .thumb { width: 92px; height: 92px; border-radius: 16px; object-fit: cover; flex: 0 0 92px; background: #f5f5f4; }
  .card .info { flex: 1; min-width: 0; }
  .card .st-line { font-size: clamp(23px, 6.3vw, 27px); font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .card .st-emoji { font-size: 29px; }
  .card .date { font-size: 18px; color: #78716c; margin-top: 6px; }
  .card .price-tag { font-size: 20px; color: #16a34a; font-weight: 800; margin-top: 4px; }
  .card .go { font-size: 30px; color: #d6d3d1; flex: 0 0 auto; }

  .empty { background: #fff; border-radius: 22px; padding: 34px 20px; text-align: center; font-size: 23px; color: #78716c; line-height: 1.6; box-shadow: 0 4px 14px rgba(0,0,0,.05); }
  .past-toggle { width: 100%; background: none; border: none; color: #78716c; font-size: 21px; padding: 14px; cursor: pointer; text-decoration: underline; }

  .call-btn { width: 100%; min-height: 88px; margin-top: 22px; border: 3px solid #16a34a; border-radius: 22px; background: #fff; color: #16a34a;
    font-size: clamp(26px, 7vw, 30px); font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none; }
  .call-btn:active { background: #f0fdf4; }

  .detail { position: fixed; inset: 0; background: #FFF7ED; z-index: 20; overflow-y: auto; display: none; }
  .detail.on { display: block; }
  .back-bar { position: sticky; top: 0; background: #FFF7ED; padding: calc(14px + env(safe-area-inset-top)) 4px 10px; z-index: 3; }
  .back-btn { border: none; background: #fff; border-radius: 16px; font-size: 24px; font-weight: 800; padding: 14px 22px; cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,.08); display: inline-flex; align-items: center; gap: 8px; }
  .detail-photo { width: 100%; border-radius: 22px; margin: 6px 0 8px; background: #fff; display: block; }

  .stepper { display: flex; justify-content: space-between; position: relative; margin: 24px 2px 10px; }
  .stepper::before { content: ''; position: absolute; top: 28px; left: 9%; right: 9%; height: 5px; background: #FFEDD5; z-index: 0; }
  .stp { display: flex; flex-direction: column; align-items: center; gap: 7px; z-index: 1; width: 20%; }
  .stp .dot { width: 54px; height: 54px; border-radius: 50%; background: #FFEDD5; color: #c2410c; display: flex; align-items: center; justify-content: center; font-size: 26px; }
  .stp.done .dot { background: #EA580C; color: #fff; }
  .stp .lbl { font-size: 17px; color: #78716c; text-align: center; }
  .stp.done .lbl { color: #1c1917; font-weight: 700; }

  .now-card { background: #fff; border-radius: 22px; padding: 24px; margin-top: 16px; box-shadow: 0 4px 14px rgba(0,0,0,.06); text-align: center; }
  .now-card .big-emoji { font-size: 56px; }
  .now-card .now-title { font-size: clamp(28px, 8vw, 34px); font-weight: 800; margin: 8px 0 6px; }
  .now-card .now-msg { font-size: clamp(21px, 6vw, 25px); color: #57534e; line-height: 1.55; white-space: pre-line; }

  /* 금액 안내 (quoted) - 후불이라 아직 낼 필요 없음 안내 */
  .quote-card { background: #F0FDF4; border: 3px solid #16a34a; border-radius: 22px; padding: 22px; margin-top: 16px; text-align: center; }
  .quote-card .q-label { font-size: 22px; color: #15803d; font-weight: 700; }
  .quote-card .q-amount { font-size: clamp(40px, 12vw, 52px); font-weight: 800; color: #15803d; margin: 6px 0; }
  .quote-card .q-note { font-size: 21px; color: #57534e; line-height: 1.5; }

  .pay-card { background: #FFF7ED; border: 3px solid #EA580C; border-radius: 22px; padding: 22px; margin-top: 16px; }
  .pay-card h3 { font-size: 25px; margin: 0 0 12px; color: #c2410c; }
  .pay-row { display: flex; justify-content: space-between; font-size: 23px; padding: 6px 0; }
  .pay-row.total { font-size: 28px; font-weight: 800; border-top: 2px dashed #FDBA74; margin-top: 8px; padding-top: 12px; }
  .pay-acct { background: #fff; border-radius: 16px; padding: 16px; margin-top: 14px; font-size: 24px; font-weight: 700; text-align: center; }

  /* 취소 요청 */
  .cancel-req-btn { width: 100%; min-height: 74px; margin-top: 20px; border: 3px solid #fca5a5; border-radius: 20px; background: #fff; color: #dc2626; font-size: clamp(22px, 6vw, 25px); font-weight: 800; cursor: pointer; }
  .cancel-req-btn:active { background: #fef2f2; }
  .cb-note { text-align: center; font-size: 19px; color: #78716c; margin-top: 10px; line-height: 1.4; }
  .cancel-box { background: #fef2f2; border: 3px solid #fca5a5; border-radius: 20px; padding: 22px; margin-top: 18px; text-align: center; }
  .cancel-box .cb-t { font-size: clamp(24px, 6.5vw, 28px); font-weight: 800; color: #dc2626; }
  .cancel-box .cb-m { font-size: 21px; color: #57534e; margin-top: 8px; line-height: 1.5; white-space: pre-line; }

  /* 최초 등록 화면 */
  .reg { position: fixed; inset: 0; background: #FFF7ED; z-index: 30; overflow-y: auto; display: none; }
  .reg.on { display: block; }
  .reg .wrap { padding-top: calc(22px + env(safe-area-inset-top)); text-align: center; }
  .reg-logo { width: 84px; height: 84px; border-radius: 22px; margin: 6px auto 0; }
  .reg-title { font-size: clamp(25px, 7.2vw, 31px); font-weight: 800; margin: 14px 0 8px; line-height: 1.35; }
  .reg-sub { font-size: clamp(19px, 5vw, 22px); color: #57534e; line-height: 1.5; margin: 0 0 12px; }
  .reg-label { display: block; text-align: left; font-size: 21px; font-weight: 800; color: #c2410c; margin: 20px 4px 8px; }
  .reg-input { width: 100%; font-size: 24px; padding: 18px; border: 3px solid #FDBA74; border-radius: 18px; background: #fff; }
  .reg-input:focus { outline: none; border-color: #EA580C; }
  .reg-btn { width: 100%; min-height: 100px; margin-top: 28px; border: none; border-radius: 24px; background: #EA580C; color: #fff; font-size: clamp(28px, 8vw, 34px); font-weight: 800; cursor: pointer; }
  .reg-btn:active { background: #c2410c; }
  .reg-cancel { width: 100%; background: none; border: none; color: #78716c; font-size: 21px; padding: 16px; margin-top: 6px; cursor: pointer; }
  .edit-info { width: 100%; background: none; border: none; color: #78716c; font-size: 19px; padding: 16px; margin-top: 6px; text-decoration: underline; cursor: pointer; }

  .sheet { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); align-items: flex-end; z-index: 40; }
  .sheet.on { display: flex; }
  .sheet-inner { background: #fff; width: 100%; max-width: 520px; margin: 0 auto; border-radius: 30px 30px 0 0; padding: 28px 22px calc(26px + env(safe-area-inset-bottom)); text-align: center; }
  .sheet-inner img { max-width: 65%; max-height: 210px; border-radius: 16px; margin: 6px auto 14px; display: block; }
  .sheet-inner .big { font-size: clamp(28px, 8vw, 32px); font-weight: 800; margin-bottom: 6px; }
  .sheet-inner .small { font-size: 21px; color: #57534e; margin-bottom: 18px; line-height: 1.5; white-space: pre-line; }
  .confirm-btn { width: 100%; min-height: 100px; border: none; border-radius: 22px; background: #EA580C; color: #fff; font-size: clamp(28px, 8vw, 32px); font-weight: 800; cursor: pointer; }
  .confirm-btn:active { background: #c2410c; }
  .cancel { margin-top: 14px; background: none; border: none; color: #78716c; font-size: 22px; }

  .toast { position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%) translateY(30px); background: #1c1917; color: #fff; font-size: 24px; font-weight: 700; padding: 18px 28px; border-radius: 18px; opacity: 0; transition: .3s; z-index: 60; max-width: 90%; text-align: center; }
  .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap" id="home">
  <header><img src="icons/icon-192.png" alt=""><span class="name">손주마켓</span></header>

  <button class="order-btn" id="orderBtn">
    <span class="cam">📷</span>
    <span class="t1">사진 올려서 주문</span>
    <span class="t2">사진 고르기만 하면 돼요</span>
  </button>
  <input type="file" id="fileInput" accept="image/*">

  <div class="howto">
    <div class="htline">📸 휴대폰에서 캡쳐한 사진을<br>올려주세요</div>
    <div class="steps3">
      <div class="s3"><div class="ic">📱</div><div class="tx">① 마음에 든 옷<br>사진 찍기</div></div>
      <div class="arrow3">▶</div>
      <div class="s3"><div class="ic">⬆️</div><div class="tx">② 위 버튼 눌러<br>사진 올리기</div></div>
      <div class="arrow3">▶</div>
      <div class="s3"><div class="ic">🏠</div><div class="tx">③ 집에서<br>받기</div></div>
    </div>
  </div>

  <div class="promise" id="promise"></div>

  <div class="section-title">내 주문</div>
  <div id="ongoing"></div>
  <button class="past-toggle" id="pastToggle" style="display:none"></button>
  <div id="past" style="display:none"></div>

  <a class="call-btn" href="tel:16000000">📞 전화로 도와드려요</a>
  <button class="edit-info" id="editInfoBtn">⚙️ 내 정보 고치기 (주소·연락처)</button>
</div>

<!-- 최초 등록 -->
<div class="reg" id="reg">
  <div class="wrap">
    <img class="reg-logo" src="icons/icon-192.png" alt="">
    <div class="reg-title" id="regTitle">손주마켓에 오신 걸<br>환영해요 🎉</div>
    <div class="reg-sub" id="regSub">딱 한 번만 적어주세요.<br>다음부터는 사진만 올리면<br>이 주소로 보내드려요.</div>
    <label class="reg-label">성함 (이름)</label>
    <input class="reg-input" id="r-name" placeholder="예: 김순자">
    <label class="reg-label">전화번호</label>
    <input class="reg-input" id="r-phone" type="tel" inputmode="tel" placeholder="예: 010-1234-5678">
    <label class="reg-label">집 주소</label>
    <input class="reg-input" id="r-addr1" placeholder="예: 경상북도 ○○군 ○○면 ○○길 12">
    <label class="reg-label">상세 주소 (동/호수)</label>
    <input class="reg-input" id="r-addr2" placeholder="예: 101동 202호 (없으면 비워두세요)">
    <button class="reg-btn" id="regBtn">저장하고 시작하기</button>
    <button class="reg-cancel" id="regCancel" style="display:none">그만두기</button>
  </div>
</div>

<div class="detail" id="detail">
  <div class="wrap">
    <div class="back-bar"><button class="back-btn" id="backBtn">◀ 뒤로</button></div>
    <div id="detailBody"></div>
    <a class="call-btn" href="tel:16000000">📞 전화로 물어보기</a>
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <div class="big">이 사진으로 주문할까요?</div>
    <img id="preview" alt="">
    <div class="small" id="sheetPromise"></div>
    <button class="confirm-btn" id="confirmBtn">네, 주문할래요</button>
    <br><button class="cancel" id="cancelBtn">다시 고를게요</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="store.js"></script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
  var $ = function (id) { return document.getElementById(id); };
  var pendingPhoto = null;

  // 당일처리 문구
  var proc = Store.processing();
  $('promise').textContent = proc.badge;
  $('sheetPromise').textContent = proc.line;

  $('orderBtn').addEventListener('click', function () { $('fileInput').click(); });
  $('fileInput').addEventListener('change', function () {
    var f = this.files && this.files[0]; if (!f) return;
    downscale(f, 1200, function (dataUrl) { pendingPhoto = dataUrl; $('preview').src = dataUrl; $('sheet').classList.add('on'); });
  });
  $('cancelBtn').addEventListener('click', function () { $('sheet').classList.remove('on'); pendingPhoto = null; $('fileInput').value = ''; });
  $('confirmBtn').addEventListener('click', function () {
    if (!pendingPhoto) return;
    Store.create({ photo: pendingPhoto });
    pendingPhoto = null; $('fileInput').value = ''; $('sheet').classList.remove('on');
    toast('주문이 들어갔어요! 👍'); render();
  });

  function downscale(file, maxW, cb) {
    var img = new Image();
    img.onload = function () {
      var scale = Math.min(1, maxW / img.width);
      var w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      var c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      try { cb(c.toDataURL('image/jpeg', 0.8)); }
      catch (e) { var r = new FileReader(); r.onload = function () { cb(r.result); }; r.readAsDataURL(file); }
    };
    img.onerror = function () { var r = new FileReader(); r.onload = function () { cb(r.result); }; r.readAsDataURL(file); };
    img.src = URL.createObjectURL(file);
  }

  function fmtDate(ts) { var d = new Date(ts); return (d.getMonth() + 1) + '월 ' + d.getDate() + '일'; }
  function money(n) { return n == null ? null : Number(n).toLocaleString('ko-KR') + '원'; }
  function total(o) { return (Number(o.price) || 0) + (Number(o.fee) || 0); }

  function cardHtml(o) {
    var s = Store.stage(o.status);
    var cls = (o.status === 'arrived') ? ' hot' : (o.status === 'quoted' ? ' money' : '');
    var priceTag = (o.status === 'quoted' && o.price != null) ? '<div class="price-tag">💰 ' + money(total(o)) + '</div>' : '';
    var cancelTag = (o.cancelRequested && o.status !== 'canceled') ? '<div class="cancel-tag">🚫 취소 요청됨 (전화 확인 중)</div>' : '';
    return '<div class="card' + cls + '" data-id="' + o.id + '">' +
      '<img class="thumb" src="' + o.photo + '" alt="">' +
      '<div class="info"><div class="st-line"><span class="st-emoji">' + s.emoji + '</span>' + s.userLabel + '</div>' +
      '<div class="date">' + fmtDate(o.createdAt) + ' 주문</div>' + priceTag + cancelTag + '</div><div class="go">›</div></div>';
  }

  function render() {
    var all = Store.orders();
    var ongoing = all.filter(function (o) { return o.status !== 'done' && o.status !== 'canceled'; });
    var past = all.filter(function (o) { return o.status === 'done' || o.status === 'canceled'; });
    if (all.length === 0) $('ongoing').innerHTML = '<div class="empty">아직 주문이 없어요<br>위 <b>큰 주황 버튼</b>을 눌러<br>사진을 올려보세요</div>';
    else if (ongoing.length === 0) $('ongoing').innerHTML = '<div class="empty">진행 중인 주문이 없어요</div>';
    else $('ongoing').innerHTML = ongoing.map(cardHtml).join('');

    if (past.length > 0) { $('pastToggle').style.display = 'block';
      $('pastToggle').textContent = pastOpen ? '지난 주문 접기' : '지난 주문 ' + past.length + '개 보기';
      $('past').innerHTML = past.map(cardHtml).join(''); }
    else { $('pastToggle').style.display = 'none'; $('past').innerHTML = ''; }
    bindCards();
  }
  var pastOpen = false;
  $('pastToggle').addEventListener('click', function () { pastOpen = !pastOpen; $('past').style.display = pastOpen ? 'block' : 'none'; render(); });
  function bindCards() { var c = document.querySelectorAll('.card'); for (var i = 0; i < c.length; i++) c[i].addEventListener('click', function () { openDetail(this.getAttribute('data-id')); }); }

  var currentDetailId = null;
  function openDetail(id) {
    var o = Store.get(id); if (!o) return;
    var s = Store.stage(o.status);
    var stepHtml = (o.status === 'canceled') ? '' : ('<div class="stepper">' + Store.STEPPER.map(function (n) {
      var done = s.step >= n.th ? ' done' : '';
      return '<div class="stp' + done + '"><div class="dot">' + n.emoji + '</div><div class="lbl">' + n.label + '</div></div>';
    }).join('') + '</div>');

    var itemLine = o.itemName ? ('<div class="now-msg" style="margin-top:10px">주문한 것: <b>' + o.itemName + '</b></div>') : '';

    // 금액 안내 (금액안내 단계이고 아직 도착 전) — 후불이라 아직 낼 필요 없음
    var quoteHtml = '';
    if (o.status === 'quoted' && o.price != null) {
      quoteHtml = '<div class="quote-card"><div class="q-label">이 금액이에요</div>' +
        '<div class="q-amount">' + money(total(o)) + '</div>' +
        '<div class="q-note">지금 안 내셔도 돼요.\n물건 받으신 다음에 내시면 돼요. (후불)</div></div>';
    }

    // 결제 안내 (도착/완료)
    var payHtml = '';
    if (o.status === 'arrived' || o.status === 'done') {
      var p = Store.profile();
      var head = o.status === 'done' ? '입금 고맙습니다 ✅' : '이렇게 넣어주세요';
      if (o.price != null) {
        payHtml = '<div class="pay-card"><h3>💳 ' + head + '</h3>' +
          '<div class="pay-row"><span>물건값</span><span>' + money(o.price) + '</span></div>' +
          '<div class="pay-row"><span>수수료</span><span>' + money(o.fee || 0) + '</span></div>' +
          '<div class="pay-row total"><span>모두</span><span>' + money(total(o)) + '</span></div>' +
          '<div class="pay-acct">' + Store.shopAccount() + '</div></div>';
      } else {
        payHtml = '<div class="pay-card"><h3>💳 ' + head + '</h3><div class="pay-row"><span>금액은 곧 전화로 알려드려요</span></div><div class="pay-acct">' + p.account + '</div></div>';
      }
    }

    // 취소: 구매 전이면 취소요청 버튼 / 이미 요청됐으면 안내 / 진행된 주문은 없음
    var cancelHtml = '';
    if (o.status !== 'canceled') {
      if (o.cancelRequested) {
        cancelHtml = '<div class="cancel-box"><div class="cb-t">🚫 취소 요청됐어요</div>' +
          '<div class="cb-m">전화로 확인하고\n취소해드릴게요.</div></div>';
      } else if (Store.cancelable(o.status)) {
        cancelHtml = '<button class="cancel-req-btn" id="cancelReqBtn">주문을 취소하고 싶어요</button>' +
          '<div class="cb-note">취소는 전화로 확인한 뒤 처리해드려요</div>';
      }
    }

    $('detailBody').innerHTML =
      '<img class="detail-photo" src="' + o.photo + '" alt="주문한 사진">' + stepHtml +
      '<div class="now-card"><div class="big-emoji">' + s.emoji + '</div><div class="now-title">' + s.userLabel + '</div>' +
      '<div class="now-msg">' + s.userMsg + '</div>' + itemLine + '</div>' + quoteHtml + payHtml + cancelHtml;
    $('detail').classList.add('on'); window.scrollTo(0, 0); $('detail').scrollTop = 0; currentDetailId = id;

    var crb = $('cancelReqBtn');
    if (crb) crb.addEventListener('click', function () {
      if (confirm('주문을 취소하고 싶으세요?\n전화로 확인한 뒤 취소해드려요.')) {
        Store.update(id, { cancelRequested: true });
        toast('취소 요청이 들어갔어요. 전화로 확인해드릴게요.');
        openDetail(id);
      }
    });
  }
  $('backBtn').addEventListener('click', function () { $('detail').classList.remove('on'); currentDetailId = null; render(); });

  var toastTimer = null;
  function toast(msg) { var t = $('toast'); t.textContent = msg; t.classList.add('on'); clearTimeout(toastTimer); toastTimer = setTimeout(function () { t.classList.remove('on'); }, 2200); }

  // ── 최초 등록 (처음 한 번 이름·연락처·주소) ──
  function showRegister(edit) {
    var p = Store.profile();
    $('r-name').value = edit ? (p.name || '') : '';
    $('r-phone').value = edit ? (p.phone || '') : '';
    $('r-addr1').value = edit ? (p.addr1 || '') : '';
    $('r-addr2').value = edit ? (p.addr2 || '') : '';
    $('regTitle').innerHTML = edit ? '내 정보 고치기' : '손주마켓에 오신 걸<br>환영해요 🎉';
    $('regSub').innerHTML = edit ? '주소나 연락처가 바뀌면<br>여기서 고치세요.' : '딱 한 번만 적어주세요.<br>다음부터는 사진만 올리면<br>이 주소로 보내드려요.';
    $('regCancel').style.display = edit ? 'block' : 'none';
    $('reg').classList.add('on'); window.scrollTo(0, 0); $('reg').scrollTop = 0;
  }
  $('regBtn').addEventListener('click', function () {
    var name = $('r-name').value.trim(), phone = $('r-phone').value.trim(), a1 = $('r-addr1').value.trim(), a2 = $('r-addr2').value.trim();
    if (!name) { toast('성함을 적어주세요'); return; }
    if (!phone) { toast('전화번호를 적어주세요'); return; }
    if (!a1) { toast('집 주소를 적어주세요'); return; }
    Store.saveProfile({ name: name, phone: phone, address: (a1 + ' ' + a2).trim(), addr1: a1, addr2: a2 });
    $('reg').classList.remove('on');
    toast('저장했어요! 이제 사진만 올리면 돼요 👍');
    render();
  });
  $('regCancel').addEventListener('click', function () { $('reg').classList.remove('on'); });
  $('editInfoBtn').addEventListener('click', function () { showRegister(true); });

  Store.onChange(function () { render(); if (currentDetailId && $('detail').classList.contains('on')) openDetail(currentDetailId); });
  Store.init();
  // 처음이면 등록 화면 (다음 틱에 확실히 실행)
  function gateRegister() { if (!Store.isRegistered()) showRegister(false); }
  gateRegister();
  window.addEventListener('load', gateRegister);
</script>
</body>
</html>
